<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Excel Analyzer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #7c6af7;
    --accent2: #f76a8a;
    --accent3: #6af7c8;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --success: #6af7c8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

  /* Header */
  header { display: flex; align-items: center; gap: 16px; margin-bottom: 48px; }
  .logo {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: grid; place-items: center;
    font-size: 20px;
  }
  h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.03em; }
  h1 span { color: var(--accent); }
  .badge {
    margin-left: auto;
    background: rgba(124,106,247,0.15);
    border: 1px solid rgba(124,106,247,0.3);
    color: var(--accent);
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  /* Upload zone */
  #drop-zone {
    border: 2px dashed var(--border);
    border-radius: 20px;
    padding: 60px 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }
  #drop-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(124,106,247,0.08) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  #drop-zone:hover, #drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(124,106,247,0.05);
  }
  #drop-zone:hover::before, #drop-zone.drag-over::before { opacity: 1; }
  #drop-zone .icon { font-size: 3rem; margin-bottom: 16px; display: block; }
  #drop-zone h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
  #drop-zone p { color: var(--muted); font-size: 0.9rem; }
  #file-input { display: none; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--accent);
    color: #fff;
    border: none; cursor: pointer;
    padding: 10px 20px;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    margin-top: 20px;
    transition: all 0.2s;
  }
  .btn:hover { background: #9580ff; transform: translateY(-1px); }
  .btn.secondary {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn.secondary:hover { background: var(--border); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Main content */
  #main { display: none; }
  #main.visible { display: block; }

  /* Sheet tabs */
  .tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .tab {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.2s;
  }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tab:hover:not(.active) { border-color: var(--accent); color: var(--text); }

  /* Stats row */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .stat-label { color: var(--muted); font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .stat-val { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.03em; }

  /* Panel grid */
  .panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  @media (max-width: 768px) { .panel-grid { grid-template-columns: 1fr; } }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-weight: 700;
    font-size: 0.9rem;
    display: flex; align-items: center; gap: 8px;
  }
  .panel-body { padding: 20px; }

  /* Chart type selector */
  .chart-types { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .chart-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    transition: all 0.2s;
  }
  .chart-btn.active { background: rgba(124,106,247,0.2); border-color: var(--accent); color: var(--accent); }

  /* Column select */
  .col-selects { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    flex: 1; min-width: 120px;
    cursor: pointer;
  }
  select:focus { outline: none; border-color: var(--accent); }

  canvas { max-height: 280px; }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: auto;
    margin-bottom: 20px;
    max-height: 360px;
  }
  table { width: 100%; border-collapse: collapse; font-family: 'DM Mono', monospace; font-size: 0.8rem; }
  thead { position: sticky; top: 0; z-index: 2; }
  th {
    background: var(--surface2);
    padding: 12px 16px;
    text-align: left;
    font-weight: 500;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td {
    padding: 10px 16px;
    border-bottom: 1px solid rgba(42,42,61,0.6);
    white-space: nowrap;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  tr:hover td { background: rgba(124,106,247,0.05); }
  .numeric { color: var(--accent3); }

  /* AI Chat */
  .ai-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .chat-messages {
    padding: 20px;
    min-height: 200px;
    max-height: 340px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg { display: flex; gap: 10px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 30px; height: 30px; border-radius: 8px;
    display: grid; place-items: center;
    font-size: 14px; flex-shrink: 0;
  }
  .msg.ai .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .msg.user .msg-avatar { background: var(--surface2); border: 1px solid var(--border); }
  .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 0.88rem;
    line-height: 1.6;
    max-width: 80%;
  }
  .msg.user .msg-bubble { background: rgba(124,106,247,0.15); border-color: rgba(124,106,247,0.3); }
  .chat-input-row {
    display: flex; gap: 10px;
    padding: 16px;
    border-top: 1px solid var(--border);
  }
  .chat-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 0.88rem;
    outline: none;
  }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--muted); }

  /* Column stats panel */
  .col-stats { display: flex; flex-direction: column; gap: 10px; }
  .col-stat-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .col-stat-row:last-child { border-bottom: none; }
  .col-name { font-weight: 600; font-size: 0.85rem; }
  .col-type {
    font-size: 0.7rem; padding: 2px 8px; border-radius: 100px;
    font-weight: 600; letter-spacing: 0.05em;
  }
  .type-num { background: rgba(106,247,200,0.15); color: var(--accent3); }
  .type-text { background: rgba(247,106,138,0.15); color: var(--accent2); }
  .col-extra { color: var(--muted); font-size: 0.8rem; font-family: 'DM Mono', monospace; }

  /* Loading spinner */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state { color: var(--muted); text-align: center; padding: 40px; font-size: 0.9rem; }

  .file-info {
    display: flex; align-items: center; gap: 12px;
    background: rgba(106,247,200,0.08);
    border: 1px solid rgba(106,247,200,0.2);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 24px;
    font-size: 0.85rem;
  }
  .file-info strong { color: var(--accent3); }

  /* Typing dots */
  .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing span {
    width: 6px; height: 6px; background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">📊</div>
    <h1>Excel<span>Analyzer</span></h1>
    <span class="badge">AI POWERED</span>
  </header>

  <!-- Upload -->
  <div id="drop-zone" onclick="document.getElementById('file-input').click()">
    <span class="icon">⬆️</span>
    <h2>Drop your Excel file here</h2>
    <p>Supports .xlsx, .xls, .csv files</p>
    <button class="btn" onclick="event.stopPropagation(); document.getElementById('file-input').click()">
      📂 Choose File
    </button>
    <input type="file" id="file-input" accept=".xlsx,.xls,.csv" />
  </div>

  <!-- Main content -->
  <div id="main">
    <div class="file-info" id="file-info"></div>

    <!-- Sheet tabs -->
    <div class="tabs" id="tabs"></div>

    <!-- Stats -->
    <div class="stats-row" id="stats-row"></div>

    <!-- Chart + Column Info -->
    <div class="panel-grid">
      <div class="panel">
        <div class="panel-header">📈 Visualization</div>
        <div class="panel-body">
          <div class="chart-types" id="chart-types">
            <button class="chart-btn active" data-type="bar">Bar</button>
            <button class="chart-btn" data-type="line">Line</button>
            <button class="chart-btn" data-type="pie">Pie</button>
            <button class="chart-btn" data-type="scatter">Scatter</button>
          </div>
          <div class="col-selects">
            <select id="x-col"><option>— X axis —</option></select>
            <select id="y-col"><option>— Y axis —</option></select>
          </div>
          <canvas id="myChart"></canvas>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header">🔬 Column Analysis</div>
        <div class="panel-body">
          <div class="col-stats" id="col-stats"></div>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap" id="table-wrap"></div>

    <!-- AI Chat -->
    <div class="ai-panel">
      <div class="panel-header">🤖 AI Data Assistant</div>
      <div class="chat-messages" id="chat-messages">
        <div class="msg ai">
          <div class="msg-avatar">✨</div>
          <div class="msg-bubble">Hi! I'm your AI data analyst. Upload a file and ask me anything about your data — insights, trends, anomalies, summaries, or specific questions!</div>
        </div>
      </div>
      <div class="chat-input-row">
        <input class="chat-input" id="chat-input" placeholder="Ask about your data... e.g. 'What are the top 5 rows by sales?'" />
        <button class="btn" id="send-btn" onclick="sendMessage()">Send ↗</button>
      </div>
    </div>
  </div>
</div>

<script>
  let workbook = null;
  let sheets = {};
  let currentSheet = null;
  let chartInstance = null;
  let currentChartType = 'bar';
  let fileName = '';

  // Drag and drop
  const dropZone = document.getElementById('drop-zone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) readFile(f);
  });
  document.getElementById('file-input').addEventListener('change', e => {
    if (e.target.files[0]) readFile(e.target.files[0]);
  });

  function readFile(file) {
    fileName = file.name;
    const reader = new FileReader();
    reader.onload = evt => {
      const data = new Uint8Array(evt.target.result);
      workbook = XLSX.read(data, { type: 'array' });
      sheets = {};
      workbook.SheetNames.forEach(name => {
        sheets[name] = XLSX.utils.sheet_to_json(workbook.Sheets[name], { defval: '' });
      });
      dropZone.style.display = 'none';
      document.getElementById('main').classList.add('visible');
      renderTabs();
      selectSheet(workbook.SheetNames[0]);
      document.getElementById('file-info').innerHTML = `✅ <strong>${file.name}</strong> loaded — ${workbook.SheetNames.length} sheet(s), ${(file.size/1024).toFixed(1)} KB`;
    };
    reader.readAsArrayBuffer(file);
  }

  function renderTabs() {
    const tabs = document.getElementById('tabs');
    tabs.innerHTML = workbook.SheetNames.map(n =>
      `<button class="tab" onclick="selectSheet('${n}')" id="tab-${n.replace(/\s/g,'_')}">${n}</button>`
    ).join('');
  }

  function selectSheet(name) {
    currentSheet = name;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    const tabEl = document.getElementById('tab-' + name.replace(/\s/g,'_'));
    if (tabEl) tabEl.classList.add('active');
    const data = sheets[name];
    renderStats(data);
    renderTable(data);
    renderColStats(data);
    populateSelects(data);
    renderChart();
  }

  function getColumns(data) {
    if (!data.length) return [];
    return Object.keys(data[0]);
  }

  function isNumeric(data, col) {
    return data.slice(0,20).filter(r => r[col] !== '').every(r => !isNaN(parseFloat(r[col])));
  }

  function renderStats(data) {
    const cols = getColumns(data);
    const numCols = cols.filter(c => isNumeric(data, c));
    document.getElementById('stats-row').innerHTML = [
      { label: 'Total Rows', val: data.length },
      { label: 'Columns', val: cols.length },
      { label: 'Numeric Cols', val: numCols.length },
      { label: 'Text Cols', val: cols.length - numCols.length }
    ].map(s => `
      <div class="stat-card">
        <div class="stat-label">${s.label}</div>
        <div class="stat-val">${s.val}</div>
      </div>
    `).join('');
  }

  function renderTable(data) {
    if (!data.length) { document.getElementById('table-wrap').innerHTML = '<div class="empty-state">No data found</div>'; return; }
    const cols = getColumns(data);
    const rows = data.slice(0, 100);
    document.getElementById('table-wrap').innerHTML = `
      <table>
        <thead><tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr></thead>
        <tbody>${rows.map(r => `<tr>${cols.map(c => {
          const v = r[c];
          const isNum = !isNaN(parseFloat(v)) && v !== '';
          return `<td class="${isNum ? 'numeric' : ''}">${v}</td>`;
        }).join('')}</tr>`).join('')}</tbody>
      </table>`;
  }

  function renderColStats(data) {
    if (!data.length) return;
    const cols = getColumns(data);
    document.getElementById('col-stats').innerHTML = cols.slice(0, 12).map(c => {
      const num = isNumeric(data, c);
      let extra = '';
      if (num) {
        const vals = data.map(r => parseFloat(r[c])).filter(v => !isNaN(v));
        const sum = vals.reduce((a,b) => a+b, 0);
        const avg = (sum / vals.length).toFixed(2);
        const min = Math.min(...vals).toFixed(2);
        const max = Math.max(...vals).toFixed(2);
        extra = `avg: ${avg} · min: ${min} · max: ${max}`;
      } else {
        const unique = new Set(data.map(r => r[c])).size;
        extra = `${unique} unique values`;
      }
      return `
        <div class="col-stat-row">
          <div>
            <div class="col-name">${c}</div>
            <div class="col-extra">${extra}</div>
          </div>
          <span class="col-type ${num ? 'type-num' : 'type-text'}">${num ? 'NUM' : 'TEXT'}</span>
        </div>`;
    }).join('');
  }

  function populateSelects(data) {
    const cols = getColumns(data);
    const numCols = cols.filter(c => isNumeric(data, c));
    const xSel = document.getElementById('x-col');
    const ySel = document.getElementById('y-col');
    xSel.innerHTML = cols.map(c => `<option value="${c}">${c}</option>`).join('');
    ySel.innerHTML = numCols.map(c => `<option value="${c}">${c}</option>`).join('');
    if (numCols.length > 1) ySel.selectedIndex = 1;
    xSel.onchange = ySel.onchange = renderChart;
  }

  const COLORS = ['#7c6af7','#f76a8a','#6af7c8','#f7c86a','#6ab4f7','#d06af7','#f7a06a'];

  function renderChart() {
    const data = sheets[currentSheet];
    if (!data || !data.length) return;
    const xCol = document.getElementById('x-col').value;
    const yCol = document.getElementById('y-col').value;
    if (!xCol || !yCol || xCol === '— X axis —' || yCol === '— Y axis —') return;

    const sample = data.slice(0, 50);
    const labels = sample.map(r => String(r[xCol]).slice(0, 20));
    const values = sample.map(r => parseFloat(r[yCol]) || 0);

    if (chartInstance) chartInstance.destroy();
    const ctx = document.getElementById('myChart').getContext('2d');

    const datasets = [{
      label: yCol,
      data: currentChartType === 'scatter' ? sample.map(r => ({ x: parseFloat(r[xCol]) || 0, y: parseFloat(r[yCol]) || 0 })) : values,
      backgroundColor: currentChartType === 'pie' ? COLORS : COLORS[0] + 'cc',
      borderColor: currentChartType === 'pie' ? COLORS : COLORS[0],
      borderWidth: 1.5,
      tension: 0.4,
      pointRadius: 4,
    }];

    chartInstance = new Chart(ctx, {
      type: currentChartType,
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: { labels: { color: '#e8e8f0', font: { family: 'Syne', size: 12 } } }
        },
        scales: currentChartType === 'pie' ? {} : {
          x: { ticks: { color: '#6b6b8a', maxRotation: 45, font: { size: 10 } }, grid: { color: '#2a2a3d' } },
          y: { ticks: { color: '#6b6b8a', font: { size: 10 } }, grid: { color: '#2a2a3d' } }
        }
      }
    });
  }

  // Chart type buttons
  document.querySelectorAll('.chart-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.chart-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentChartType = btn.dataset.type;
      renderChart();
    });
  });

  // AI Chat
  function getDataSummary() {
    if (!currentSheet || !sheets[currentSheet]) return 'No data loaded.';
    const data = sheets[currentSheet];
    const cols = getColumns(data);
    const numCols = cols.filter(c => isNumeric(data, c));
    let summary = `File: ${fileName}\nSheet: ${currentSheet}\nRows: ${data.length}, Columns: ${cols.length}\n`;
    summary += `Columns: ${cols.join(', ')}\n`;
    summary += `Numeric columns: ${numCols.join(', ')}\n`;
    numCols.forEach(c => {
      const vals = data.map(r => parseFloat(r[c])).filter(v => !isNaN(v));
      const sum = vals.reduce((a,b)=>a+b,0);
      summary += `${c}: min=${Math.min(...vals).toFixed(2)}, max=${Math.max(...vals).toFixed(2)}, avg=${(sum/vals.length).toFixed(2)}, sum=${sum.toFixed(2)}\n`;
    });
    // First 10 rows as CSV
    summary += '\nFirst 10 rows:\n';
    summary += cols.join(',') + '\n';
    data.slice(0,10).forEach(r => { summary += cols.map(c => r[c]).join(',') + '\n'; });
    return summary;
  }

  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const btn = document.getElementById('send-btn');
    const msg = input.value.trim();
    if (!msg) return;
    if (!currentSheet) { addMsg('ai', 'Please upload a file first!'); return; }

    addMsg('user', msg);
    input.value = '';
    btn.disabled = true;

    const typingId = addTyping();

    try {
      const summary = getDataSummary();
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: `You are an expert data analyst. The user has uploaded an Excel/CSV file. Here is a summary of the data:\n\n${summary}\n\nAnswer questions about this data concisely and insightfully. Use bullet points for lists. Be specific with numbers when relevant.`,
          messages: [{ role: 'user', content: msg }]
        })
      });
      const data = await response.json();
      removeTyping(typingId);
      const text = data.content?.map(b => b.text || '').join('') || 'Sorry, I could not process that.';
      addMsg('ai', text);
    } catch(err) {
      removeTyping(typingId);
      addMsg('ai', 'Error reaching AI. Please try again.');
    }
    btn.disabled = false;
  }

  function addMsg(role, text) {
    const box = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="msg-avatar">${role === 'ai' ? '✨' : '👤'}</div>
      <div class="msg-bubble">${text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/^• /gm,'• ')}</div>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  let typingCounter = 0;
  function addTyping() {
    const id = ++typingCounter;
    const box = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = `typing-${id}`;
    div.innerHTML = `<div class="msg-avatar">✨</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return id;
  }
  function removeTyping(id) {
    const el = document.getElementById(`typing-${id}`);
    if (el) el.remove();
  }

  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
</script>
</body>
</html>
